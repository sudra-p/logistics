upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name erp.parthsudra.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name erp.parthsudra.com;

    ssl_certificate /etc/letsencrypt/live/erp.parthsudra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.parthsudra.com/privkey.pem;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
